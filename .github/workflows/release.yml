name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release artifact
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag against Cargo.toml
        shell: pwsh
        run: .\scripts\Assert-ReleaseTagMatchesVersion.ps1 -Tag "${{ github.ref_name }}"

      - name: Build release binary
        shell: pwsh
        run: |
          . .\scripts\Set-WindowsBuildEnv.ps1
          cargo build --release --locked

      - name: Package Windows release archive
        shell: pwsh
        run: .\scripts\Package-WindowsRelease.ps1 -Version "${{ github.ref_name }}"

      - name: Smoke test packaged release archive
        shell: pwsh
        run: .\scripts\Test-WindowsReleaseArchive.ps1 -ZipPath "dist\lingopilot-tts-piper-${{ github.ref_name }}-windows-x86_64.zip"

      - name: Verify readiness gate
        shell: pwsh
        run: .\scripts\Verify-Readiness.ps1 -Packaged

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: |
            dist/lingopilot-tts-piper-${{ github.ref_name }}-windows-x86_64.zip
            dist/lingopilot-tts-piper-${{ github.ref_name }}-sha256.txt
